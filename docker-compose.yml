version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - SOLR_HOST=solr
      - SOLR_PORT=8983
    depends_on:
      - solr
    networks:
      - solr-network
    volumes:
      - ./src/main/resources/data:/app/data

  solr:
    image: solr:9-slim
    ports:
      - "8983:8983"
    volumes:
      - solr-data:/var/solr
    environment:
      - SOLR_HOST=solr
    command:
      - solr-precreate
      - Projects_Solr
    networks:
      - solr-network

volumes:
  solr-data:

networks:
  solr-network:
    driver: bridge
